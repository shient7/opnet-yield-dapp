<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OpNet Yield Aggregator — Bitcoin L2 Testnet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --btc:#f7931a;--btc2:#c96b00;--glow:rgba(247,147,26,.3);
  --dim:rgba(247,147,26,.1);--bdr:rgba(247,147,26,.22);
  --bg:#050505;--s1:rgba(255,255,255,.032);--s2:rgba(255,255,255,.07);
  --tx:#efefef;--mu:rgba(239,239,239,.42);
  --gr:#22c55e;--ye:#fbbf24;--rd:#ef4444;
  --mono:'Space Mono',monospace;--sans:'Barlow',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px}
a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:var(--sans);border:none;background:none}

/* BG */
#c{position:fixed;inset:0;z-index:0;opacity:.4;pointer-events:none}
.glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:80vw;height:50vw;background:radial-gradient(ellipse,rgba(247,147,26,.055) 0%,transparent 68%);pointer-events:none;z-index:0}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(247,147,26,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(247,147,26,.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0}

@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--glow)}50%{box-shadow:0 0 24px var(--glow)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.fu{animation:up .35s ease both}
.fu1{animation:up .35s .08s ease both}

/* NAV */
nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:13px 26px;border-bottom:1px solid var(--bdr);background:rgba(5,5,5,.88);backdrop-filter:blur(18px)}
.logo{display:flex;align-items:center;gap:10px}
.li{width:36px;height:36px;background:linear-gradient(135deg,var(--btc),var(--btc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;animation:pulse 3s infinite}
.ln{font-size:16px;font-weight:800;letter-spacing:-.4px}.ln span{color:var(--btc)}
.ls{font-size:9px;color:var(--mu);letter-spacing:2px;font-family:var(--mono);text-transform:uppercase}
.tabs{display:flex;gap:2px;background:var(--s1);border:1px solid var(--s2);border-radius:8px;padding:3px}
.tb{padding:6px 16px;border-radius:5px;color:var(--mu);font-size:13px;font-weight:600;transition:all .2s}
.tb:hover{color:var(--tx);background:rgba(255,255,255,.04)}
.tb.on{background:var(--dim);color:var(--btc);border:1px solid var(--bdr)}
.nr{display:flex;align-items:center;gap:7px}
.tnb{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;color:var(--ye);background:rgba(251,191,36,.09);border:1px solid rgba(251,191,36,.25);border-radius:4px;padding:3px 7px;text-transform:uppercase}
.wchip{display:flex;align-items:center;gap:6px;background:var(--dim);border:1px solid var(--bdr);border-radius:8px;padding:7px 11px}
.wdot{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 7px var(--gr)}
.waddr{font-family:var(--mono);font-size:11px}
.wbal{font-family:var(--mono);font-size:11px;color:var(--btc);font-weight:700}
.bdisc{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:7px;color:#f87171;padding:6px 11px;font-size:11px;font-weight:600;transition:all .2s}
.bdisc:hover{background:rgba(239,68,68,.15)}
.bconn{background:linear-gradient(135deg,var(--btc),var(--btc2));border-radius:9px;color:#fff;padding:9px 18px;font-size:13px;font-weight:700;box-shadow:0 0 20px var(--glow);transition:all .2s;display:flex;align-items:center;gap:6px}
.bconn:hover{transform:translateY(-1px);box-shadow:0 4px 28px var(--glow)}
.bconn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* MAIN */
main{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:26px 22px 68px}

/* HERO */
.hero{text-align:center;padding:68px 0;max-width:600px;margin:0 auto;animation:up .5s ease}
.hbdg{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--btc);background:var(--dim);border:1px solid var(--bdr);border-radius:99px;padding:4px 14px;margin-bottom:20px;text-transform:uppercase}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:blink 1.5s infinite}
.hero h1{font-size:clamp(32px,5vw,56px);font-weight:900;line-height:1.08;letter-spacing:-2px;margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,var(--btc),#ffb84d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:15px;color:var(--mu);line-height:1.7;margin-bottom:30px}
.hacts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.bhero{background:linear-gradient(135deg,var(--btc),var(--btc2));border-radius:11px;color:#fff;padding:12px 24px;font-size:14px;font-weight:700;box-shadow:0 0 26px var(--glow);transition:all .2s}
.bhero:hover{transform:translateY(-2px);box-shadow:0 6px 34px var(--glow)}
.bsec{background:var(--s1);border:1px solid var(--s2);border-radius:11px;color:var(--tx);padding:12px 24px;font-size:14px;font-weight:600;transition:all .2s;display:inline-block}
.bsec:hover{border-color:var(--bdr);color:var(--btc)}
.hstats{display:flex;gap:34px;justify-content:center}
.hsv{display:block;font-size:24px;font-weight:800;font-family:var(--mono)}
.hsl{font-size:10px;color:var(--mu);letter-spacing:1.5px;font-family:var(--mono);text-transform:uppercase}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sc{background:var(--s1);border:1px solid var(--s2);border-radius:13px;padding:17px 19px;position:relative;overflow:hidden;transition:border-color .2s}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--btc),transparent)}
.sc:hover{border-color:var(--bdr)}
.scl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.scv{font-size:20px;font-weight:700;font-family:var(--mono);margin-bottom:3px}
.scs{font-size:10px;color:var(--mu)}

/* NET ALERT */
.na{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:11px 15px;font-size:12px;color:#f87171;margin-bottom:18px;line-height:1.5}
.ya{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.25);border-radius:9px;padding:11px 15px;font-size:12px;color:var(--ye);margin-bottom:18px;line-height:1.5}

/* GRID */
.mgrid{display:grid;grid-template-columns:1fr 346px;gap:16px;align-items:start}
.acol{height:552px;position:sticky;top:74px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stt{font-size:14px;font-weight:700}
.sbdg{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;color:var(--ye);background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:5px;padding:3px 7px;text-transform:uppercase}

/* POOL CARD */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.pf{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:16px}
.pc{background:var(--s1);border:1px solid var(--s2);border-radius:14px;padding:17px;position:relative;overflow:hidden;transition:all .2s}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(247,147,26,.4),transparent);transform:scaleX(0);transition:transform .3s}
.pc:hover{border-color:var(--bdr);transform:translateY(-2px);box-shadow:0 8px 26px rgba(247,147,26,.07)}
.pc:hover::before{transform:scaleX(1)}
.prk{position:absolute;top:9px;right:9px;font-size:8px;font-weight:700;font-family:var(--mono);letter-spacing:1px;background:var(--dim);color:var(--btc);border:1px solid var(--bdr);border-radius:5px;padding:2px 7px}
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;gap:7px}
.pnm{font-size:14px;font-weight:700;margin-bottom:2px}
.ppr{font-size:10px;color:var(--mu);font-family:var(--mono)}
.rbdg{font-size:8px;font-weight:700;font-family:var(--mono);letter-spacing:1.2px;border-radius:5px;padding:3px 7px;white-space:nowrap;flex-shrink:0;border:1px solid currentColor}
.pst{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;background:rgba(0,0,0,.22);border-radius:8px;padding:10px;margin-bottom:11px}
.psl{font-size:8px;color:var(--mu);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;text-align:center}
.psv{font-size:12px;font-weight:700;text-align:center}
.psapy{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--gr);text-align:center;line-height:1}
.pdesc{font-size:11px;color:var(--mu);line-height:1.55;margin-bottom:12px}
.pft{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pmn{font-size:10px;color:var(--mu);font-family:var(--mono)}.pmn span{color:var(--btc)}
.bdep{background:linear-gradient(135deg,var(--btc),var(--btc2));border-radius:7px;color:#fff;padding:8px 14px;font-size:11px;font-weight:700;transition:all .2s;white-space:nowrap}
.bdep:hover:not(:disabled){box-shadow:0 0 14px var(--glow);transform:scale(1.02)}
.bdep:disabled{background:rgba(255,255,255,.07);color:var(--mu);cursor:not-allowed}

/* CHAT */
.chat{display:flex;flex-direction:column;height:100%;background:rgba(0,0,0,.42);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;backdrop-filter:blur(12px)}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--bdr);background:rgba(247,147,26,.04);flex-shrink:0}
.chl{display:flex;align-items:center;gap:7px}
.adot{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 7px var(--gr)}
.albl{font-size:13px;font-weight:700}
.mcpb{font-size:8px;font-family:var(--mono);letter-spacing:1.5px;color:var(--btc);background:var(--dim);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px}
.mcpl{font-size:10px;font-family:var(--mono);color:var(--mu)}.mcpl:hover{color:var(--btc)}
.cmsgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:6px;align-items:flex-end}
.mu2{flex-direction:row-reverse}
.mi{font-size:14px;flex-shrink:0;margin-bottom:2px}
.mb{max-width:82%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.6}
.ma .mb{background:rgba(255,255,255,.05);color:rgba(239,239,239,.88);border-radius:4px 12px 12px 12px}
.mu2 .mb{background:linear-gradient(135deg,var(--btc),var(--btc2));color:#fff;border-radius:12px 12px 4px 12px}
.mt .mb{background:rgba(34,197,94,.08);color:#4ade80;border:1px solid rgba(34,197,94,.2);border-radius:9px}
.me .mb{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:9px}
.typing{display:flex;gap:4px;align-items:center;height:17px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--btc);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
.qbs{padding:0 13px 7px;display:flex;flex-direction:column;gap:4px}
.qb{background:rgba(255,255,255,.02);border:1px solid var(--s2);border-radius:6px;color:var(--mu);padding:6px 10px;font-size:11px;font-family:var(--sans);text-align:left;transition:all .2s}
.qb:hover{border-color:var(--bdr);color:var(--btc);background:var(--dim)}
.cin{padding:10px 13px;border-top:1px solid var(--s2);display:flex;gap:6px;flex-shrink:0}
.ci{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:12px;font-family:var(--mono);outline:none;transition:border-color .2s}
.ci:focus{border-color:var(--btc)}.ci::placeholder{color:var(--mu)}.ci:disabled{opacity:.5}
.bsnd{background:linear-gradient(135deg,var(--btc),var(--btc2));border-radius:8px;color:#fff;width:36px;height:36px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.bsnd:hover:not(:disabled){box-shadow:0 0 13px var(--glow)}.bsnd:disabled{opacity:.4;cursor:not-allowed}

/* MODAL */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.84);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:14px;animation:up .2s ease}
.modal{background:#080808;border:1px solid var(--bdr);border-radius:18px;padding:24px;width:100%;max-width:460px;position:relative;box-shadow:0 0 60px rgba(247,147,26,.1)}
.mcl{position:absolute;top:13px;right:13px;background:rgba(255,255,255,.06);border:1px solid var(--s2);border-radius:7px;color:var(--mu);width:29px;height:29px;font-size:13px;transition:all .2s}
.mcl:hover{color:var(--tx)}
.mt2{font-size:18px;font-weight:800;margin-bottom:3px}
.ms2{font-size:11px;color:var(--mu);font-family:var(--mono);margin-bottom:17px}
.mst{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:rgba(0,0,0,.3);border-radius:10px;padding:12px;margin-bottom:16px}
.msl2{display:block;font-size:8px;color:var(--mu);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;text-align:center}
.msv2{display:block;text-align:center;font-weight:700;font-size:14px}
.flbl{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mu);margin-bottom:6px;font-family:var(--mono)}
.iw{position:relative;display:flex;align-items:center;margin-bottom:5px}
.ai{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:9px;padding:10px 52px 10px 12px;color:var(--tx);font-size:16px;font-family:var(--mono);outline:none;transition:border-color .2s}
.ai:focus{border-color:var(--btc)}
.at{position:absolute;right:12px;font-family:var(--mono);font-size:10px;color:var(--btc);pointer-events:none}
.fhnt{font-size:10px;color:var(--mu);font-family:var(--mono);margin-bottom:13px}
.proj{background:var(--dim);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.pr{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mu);padding:2px 0}
.pv{color:#4ade80;font-family:var(--mono);font-weight:700}
.mwrn{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:7px;padding:8px 11px;font-size:11px;color:rgba(251,191,36,.85);margin-bottom:16px;line-height:1.5}
.mwrn a{color:var(--ye);text-decoration:underline}
.macts{display:flex;gap:8px}
.bcan{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--s2);border-radius:9px;color:var(--mu);padding:10px;font-size:13px;font-weight:600;font-family:var(--sans);transition:all .2s}
.bcan:hover{background:rgba(255,255,255,.08);color:var(--tx)}
.bok{flex:2;background:linear-gradient(135deg,var(--btc),var(--btc2));border-radius:9px;color:#fff;padding:10px;font-size:13px;font-weight:700;font-family:var(--sans);box-shadow:0 0 16px var(--glow);transition:all .2s}
.bok:hover:not(:disabled){transform:translateY(-1px)}.bok:disabled{opacity:.5;cursor:not-allowed}
.cbox{background:rgba(0,0,0,.3);border:1px solid var(--s2);border-radius:10px;padding:13px;margin-bottom:16px}
.crow{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--mu);padding:6px 0;border-bottom:1px solid var(--s2)}
.crow:last-child{border:none}.crow span:last-child{color:var(--tx);font-weight:600}
.mctr{text-align:center;padding:18px 0;display:flex;flex-direction:column;align-items:center;gap:10px}
.ring{width:50px;height:50px;border:3px solid rgba(247,147,26,.2);border-top-color:var(--btc);border-radius:50%;animation:spin .9s linear infinite}
.sok{width:50px;height:50px;border-radius:50%;background:rgba(34,197,94,.12);border:2px solid #4ade80;color:#4ade80;font-size:21px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(34,197,94,.25)}
.serr{width:50px;height:50px;border-radius:50%;background:rgba(239,68,68,.1);border:2px solid var(--rd);color:var(--rd);font-size:21px;display:flex;align-items:center;justify-content:center}
.txlnk{font-size:11px;font-family:var(--mono);color:var(--btc);border-bottom:1px solid rgba(247,147,26,.3);padding-bottom:1px}

/* STEPS */
.steps{display:flex;gap:6px;margin-bottom:18px}
.step{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.1);transition:background .3s}
.step.done{background:var(--btc)}
.step.active{background:linear-gradient(90deg,var(--btc),var(--btc2));animation:pulse 1.5s infinite}

/* PORTFOLIO */
.prow{display:flex;align-items:center;gap:13px;background:var(--s1);border:1px solid var(--s2);border-radius:11px;padding:14px 17px;transition:border-color .2s;margin-bottom:8px}
.prow:hover{border-color:var(--bdr)}
.txbdg{font-size:10px;font-family:var(--mono);color:var(--btc);background:var(--dim);border:1px solid var(--bdr);border-radius:5px;padding:3px 6px;white-space:nowrap}

.toast{position:fixed;top:72px;right:20px;z-index:300;padding:10px 17px;border-radius:9px;font-size:13px;font-weight:600;backdrop-filter:blur(10px);animation:up .3s ease;max-width:300px;line-height:1.4}
.tok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28);color:#4ade80}
.terr{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#f87171}
.twrn{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.28);color:var(--ye)}

.cpmt{text-align:center;padding:50px 20px;color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:13px}
.emst{text-align:center;padding:50px 20px;color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:8px}
.info-box{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:9px;padding:11px 14px;font-size:11px;color:#4ade80;line-height:1.55;margin-bottom:13px}

@media(max-width:1100px){.mgrid{grid-template-columns:1fr}.acol{height:380px;position:static}.pg{grid-template-columns:1fr}}
@media(max-width:768px){.srow{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.srow{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="glow"></div>
<div class="grid"></div>
<div id="toast" class="toast" style="display:none"></div>

<!-- NAV -->
<nav>
  <div class="logo">
    <div class="li">₿</div>
    <div><div class="ln">Op<span>Net</span> Yield</div><div class="ls">Bitcoin L2 · Testnet</div></div>
  </div>
  <div class="tabs">
    <button class="tb on" data-tab="dash" onclick="setTab('dash')">Dashboard</button>
    <button class="tb" data-tab="pools" onclick="setTab('pools')">Yield Pools</button>
    <button class="tb" data-tab="port" onclick="setTab('port')">Portfolio</button>
  </div>
  <div class="nr">
    <span class="tnb">Testnet 3</span>
    <div id="nd"><button class="bconn" id="bcn" onclick="connectWallet()">⚡ Connect OpNet Wallet</button></div>
    <div id="nc" style="display:none;align-items:center;gap:7px">

// ════════════════════════════════════════════════
// WALLET — OP_WALLET / UniSat provider
// OP_WALLET injects window.opnet (fork dari UniSat, API identik)
// API: requestAccounts() · getBalance() · getNetwork()
//      sendBitcoin(addr, sats) → txid
//      signMessage(msg) → signature
//      signPsbt(psbtHex, opts) → signedPsbtHex
//      on(event, cb) · off(event, cb)

function getProvider() {
  // OP_WALLET menginjek window.opnet
  // UniSat menginjek window.unisat
  if (typeof window.opnet  !== 'undefined') return { p: window.opnet,  name: 'OP_WALLET' };
  if (typeof window.unisat !== 'undefined') return { p: window.unisat, name: 'UniSat'    };
  return null;
}

async function connectWallet() {
  const btn = document.getElementById('bcn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span> Menghubungkan…';

  const prov = getProvider();
  if (!prov) {
    btn.disabled = false;
    btn.innerHTML = '⚡ Connect OpNet Wallet';
    showInstall();
    return;
  }

  try {
    // 1) Request accounts — OP_WALLET bisa return array, string, atau object
    let raw;
    try { raw = await prov.p.requestAccounts(); } catch(e) {}
    if (!raw) {
      try { raw = await prov.p.getAccounts(); } catch(e) {}
    }
    // Normalize ke array
    let accounts = [];
    if (Array.isArray(raw))         accounts = raw;
    else if (typeof raw === 'string' && raw.length > 0) accounts = [raw];
    else if (raw?.address)          accounts = [raw.address];
    else if (raw?.accounts)         accounts = Array.isArray(raw.accounts) ? raw.accounts : [raw.accounts];

    if (!accounts.length) throw new Error('Tidak ada akun yang tersedia. Buat wallet dulu di OP_WALLET.');
    const address = accounts[0];

    // 2) Baca network — bisa string atau object
    let network = 'unknown';
    try {
      let n = await prov.p.getNetwork();
      if (typeof n === 'string')         network = n;
      else if (n?.network)               network = n.network;
      else if (n?.name)                  network = n.name;
      else if (n?.chain)                 network = String(n.chain);
      else                               network = String(n ?? 'unknown');
    } catch(e) {}
    // OP_WALLET bisa juga pakai getChain()
    if (network === 'unknown') {
      try {
        let c = await prov.p.getChain?.();
        if (c?.network) network = c.network;
        else if (c?.enum) network = c.enum;
      } catch(e) {}
    }

    // 3) Baca balance — bisa {confirmed,total,...} atau number langsung
    let sats = 0;
    try {
      const b = await prov.p.getBalance();
      if (typeof b === 'number')          sats = b;
      else if (typeof b === 'string')     sats = parseInt(b) || 0;
      else if (b != null)                 sats = b.total ?? b.confirmed ?? b.balance ?? 0;
    } catch(e) {}

    // 4) Public key
    let pubkey = '';
    try { pubkey = await prov.p.getPublicKey() || ''; } catch(e) {}

    S.w = { address, network, balance: sats / 1e8, pubkey, p: prov.p, name: prov.name };

    const ok = network?.toLowerCase().includes('test');
    if (!ok) toast('⚠️ Ganti ke Testnet 3 di wallet kamu!', 'wrn');

    updateNav();
    toast(`✓ ${prov.name} terhubung! ${sa(address)}`);
    renderPage();

    try { prov.p.on('accountsChanged', onAcc); } catch(e) {}
    try { prov.p.on('networkChanged',  onNet); } catch(e) {}

  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = '⚡ Connect OpNet Wallet';
    const msg = err?.message || '';
    if (err?.code === 4001 || msg.includes('reject') || msg.includes('cancel') || msg.includes('denied')) {
      toast('Koneksi dibatalkan', 'err');
    } else {
      toast('Gagal: ' + msg.slice(0, 80), 'err');
    }
  }
}

async function onAcc(accounts) {
  // accounts bisa array, string, atau object
  let addr = '';
  if (Array.isArray(accounts))             addr = accounts[0] || '';
  else if (typeof accounts === 'string')   addr = accounts;
  else if (accounts?.address)              addr = accounts.address;
  if (!addr) { disconnectWallet(); return; }
  S.w.address = addr;
  await refreshBal();
  updateNav();
  renderPage();
}

async function onNet(net) {
  if (!S.w) return;

// WALLET DIAGNOSTICS
// Tampilkan semua method yang tersedia di window.opnet
// ════════════════════════════════════════════════
function getWalletMethods(prov) {
  const methods = [];
  const seen = new Set();
  let obj = prov;
  // Jelajahi prototype chain
  while (obj && obj !== Object.prototype) {
    Object.getOwnPropertyNames(obj).forEach(k => {
      if (!seen.has(k) && typeof prov[k] === 'function') {
        seen.add(k);
        methods.push(k);
      }
    });
    obj = Object.getPrototypeOf(obj);
  }
  return methods.sort();
}

// ════════════════════════════════════════════════
// DEPOSIT FLOW
//
// signAndBroadcastInteraction butuh P2OP contract address format
// khusus dari @btc-vision/transaction library — tidak bisa dipakai
// dari plain HTML. Solusi: sign intent + buka protokol asli.
//
// Pool URL mapping:
//   btc-stake   → farm.motoswap.org/menu  (BTC staking MotoChef)
//   moto-lp     → motoswap.org            (swap/LP)

//   moto-stake  → farm.motoswap.org/menu  (MOTO staking)
// ════════════════════════════════════════════════

const POOL_URLS = {
  'btc-stake':    'https://farm.motoswap.org/menu',
  'moto-lp':      'https://motoswap.org',
  'moto-pill-lp': 'https://motoswap.org',
  'moto-stake':   'https://farm.motoswap.org/menu',
};

async function executeDeposit(pool, amountBTC) {
  if (!S.w?.p) throw new Error('Wallet tidak terhubung');

  const net = (S.w.network || '').toLowerCase();
  if (!net.includes('test')) {
    throw new Error('Kamu tidak di Testnet 3!\nBuka OP_WALLET → klik logo ₿ → pilih Testnet 3');
  }

  const sats = Math.floor(amountBTC * 1e8);
  if (sats < 546) throw new Error('Minimum 546 satoshi');
  if (amountBTC > S.w.balance) throw new Error(`Saldo tidak cukup. Kamu punya: ${S.w.balance.toFixed(6)} tBTC`);

  const prov = S.w.p;

  // ── Step 1: Sign intent message sebagai bukti ──
  // Ini membuktikan kamu punya wallet dan setuju dengan deposit ini
  const intent = [
    '=== OpNet Yield Aggregator Intent ===',
    `Pool: ${pool.name}`,
    `Protocol: ${pool.protocol}`,
    `Amount: ${amountBTC} tBTC (${sats} sats)`,
    `APY: ${pool.apy}%`,
    `Wallet: ${S.w.address}`,
    `Network: testnet`,
    `Timestamp: ${Date.now()}`,
    '=====================================',
  ].join('\n');

  let sig = '';
  try {
    sig = await prov.signMessage(intent);
  } catch(e) {
    // signMessage bisa gagal jika user cancel — lempar error
    const msg = e?.message || '';
    if (msg.toLowerCase().includes('cancel') || msg.toLowerCase().includes('reject') || msg.toLowerCase().includes('denied')) {
      throw new Error('Dibatalkan oleh user');
    }
    // Jika error lain, lanjut tanpa signature
    console.warn('signMessage gagal:', msg);
  }

  // ── Step 2: Buka protokol asli di tab baru ──
  const url = POOL_URLS[pool.id] || 'https://farm.motoswap.org/menu';
  setTimeout(() => window.open(url, '_blank', 'noopener'), 800);

  const txid = sig ? 'sig_' + String(sig).slice(0, 48) : 'intent_' + Date.now();
  return { txid, type: 'redirect', url };
}

// ════════════════════════════════════════════════
// OPNET JSON-RPC — baca data on-chain
// ════════════════════════════════════════════════
async function opnetRpc(method, params = []) {
  try {
    const r = await fetch(RPC, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ jsonrpc:'2.0', id:1, method, params })
    });
    const d = await r.json();
    return d.result;
  } catch(e) { return null; }
}

async function getOnchainBalance(addr) {
  const r = await opnetRpc('btc_getBalance', [addr]);
  if (!r) return null;
  return (r.confirmed ?? 0) / 1e8;
}

  if (!amt || !S.w) return;
  S.modal.step = 'signing';
  renderModal();

  try {
    const result = await executeDeposit(pool, amt);

    S.modal.txType = txType;
    S.modal.step = 'success';
    S.positions.unshift({ pool, amount, txid, txType, ts: Date.now() });

    const lbl = txType === 'contract' ? '⚡ Contract berhasil' : txType === 'signature' ? '✍️ Intent tersimpan' : '✓ Transaksi berhasil';

}

async function sendMsg(txt) {
  if (!txt.trim() || S.busy) return;
  S.msgs.push({ role:'u', text: txt.trim(), ts: Date.now() });
  S.busy = true;
  renderChat();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 800,
        system: `Kamu adalah AI agent DeFi untuk OpNet Bitcoin L2 testnet.
Wallet: ${S.w?.address||'belum connect'}. Network: ${S.w?.network||'unknown'}. Balance: ${S.w?.balance?.toFixed(6)||0} tBTC.
Pools: BTC-MOTO LP (24.7% APY), MOTO Staking (18.2%), tBTC Staking (12.5%), MOTO-PILL LP (48.3%).
Faucet: ${FAUCET}. Explorer: ${EXPLORER}. MotoSwap: ${MOTOSWAP}. MotoChef: ${MOTOCHEF}.
Balas HANYA JSON valid (no markdown): {"message":"jawaban dalam bahasa yg sama dgn user","recommendation":"1 kalimat atau null","warning":"peringatan atau null"}`,
        messages: [{role:'user', content: txt.trim()}],
        mcp_servers: [{type:'url', url:'https://ai.opnet.org/mcp', name:'opnet-mcp'}]
      })
    });
    const d = await res.json();
    const raw = d.content?.find(b=>b.type==='text')?.text || '{}';
    let p; try { p = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch { p = {message:raw}; }
    S.msgs.push({role:'a', text: p.message||'Agent merespons.', ts:Date.now()});
    if (p.recommendation) S.msgs.push({role:'t', text:'💡 '+p.recommendation, ts:Date.now()});
    if (p.warning)        S.msgs.push({role:'e', text:'⚠️ '+p.warning, ts:Date.now()});
  } catch(e) {
    S.msgs.push({role:'e', text:'⚠️ Agent tidak dapat dihubungi.', ts:Date.now()});
  }

  S.busy = false;
  renderChat();
  setTimeout(() => { const m=document.getElementById('cmsgs'); if(m) m.scrollTop=m.scrollHeight; }, 50);
}

// ════════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════════
(function(){
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=cv.width=innerWidth, H=cv.height=innerHeight;
  const pts=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.3+.4}));
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(247,147,26,.25)';ctx.fill();});
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(247,147,26,${.06*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke();}}));
    requestAnimationFrame(draw);
  })();
  window.addEventListener('resize',()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
})();

}
